---

apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: "{{ include "codebasics.fullname" . }}-redirect-httproute"
  labels:
    {{- include "codebasics.labels" . | nindent 4 }}
spec:
  hostnames:
    - "{{ .Values.primaryHost }}"
    - "{{ .Values.wildcardHost }}"
    - "{{ .Values.secondaryHost }}"
  parentRefs:
    - name: "{{ include "codebasics.fullname" . }}-gateway"
      sectionName: http
  rules:
    - filters:
        - type: RequestRedirect
          requestRedirect:
            scheme: https
            statusCode: 301
