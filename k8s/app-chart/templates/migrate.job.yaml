---

apiVersion: batch/v1
kind: Job
metadata:
  name: "{{ .Release.Name }}-migrate-{{ .Chart.Version }}"
  namespace: "{{ .Release.Namespace }}"
  labels:
    {{- include "codebasics.labels" . | nindent 4 }}
  annotations:
    # NOTE: миграции один раз за релиз, до раскатки web-подов. Helm дождётся завершения
    # Job; при падении релиз откатывается и поды не поднимутся на un-migrated БД.
    "helm.sh/hook": pre-install,pre-upgrade
    "helm.sh/hook-weight": "-5"
    "helm.sh/hook-delete-policy": before-hook-creation,hook-succeeded

spec:
  backoffLimit: 3
  activeDeadlineSeconds: 600
  # NOTE: детерминированная уборка отработавшей Job/пода через час (helm-хук
  # before-hook-creation чистит только на следующем релизе).
  ttlSecondsAfterFinished: 3600
  template:
    metadata:
      labels:
        app.kubernetes.io/name: "{{ .Release.Name }}-migrate-pod"
        app.kubernetes.io/instance: "{{ .Release.Name }}"
        helm.sh/chart: '{{ .Chart.Name }}-{{ .Chart.Version | replace "+" "_" }}'
    spec:
      restartPolicy: Never

      {{- include "codebasics.podScheduling" . | nindent 6 }}

      {{- include "codebasics.nodeAffinityService" . | nindent 6 }}

      containers:
        - name: migrate
          imagePullPolicy: IfNotPresent
          image: "{{ .Values.app.image.repository }}:{{ .Chart.Version }}"
          command: ["./bin/rails", "db:prepare"]
          resources:
            requests:
              memory: "300Mi"
              cpu: "10m"
            limits:
              memory: '600Mi'
          envFrom:
            - secretRef:
                name: codebasics-environment-secrets
          env:
            - name: HEXLET_BASICS_RELEASE_VERSION
              value: {{ .Chart.Version }}
