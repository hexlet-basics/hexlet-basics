---

apiVersion: apps/v1
kind: Deployment
metadata:
  name: "{{ .Release.Name }}-job-deployment"
  namespace: "{{ .Release.Namespace }}"
  labels:
    {{- include "codebasics.labels" . | nindent 4 }}

spec:
  replicas: 1

  selector:
    matchLabels:
      app.kubernetes.io/name: "{{ .Release.Name }}-job-pod"
      app.kubernetes.io/instance: "{{ .Release.Name }}"
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 0
      maxSurge: 1
  template:
    metadata:
      labels:
        app.kubernetes.io/name: "{{ .Release.Name }}-job-pod"
        app.kubernetes.io/instance: "{{ .Release.Name }}"
        helm.sh/chart: '{{ .Chart.Name }}-{{ .Chart.Version | replace "+" "_" }}'
        codebasics/pod: "{{ .Release.Name }}-{{ .Chart.Version }}-job-pod"
    spec:
      {{- include "codebasics.podScheduling" . | nindent 6 }}

      {{- include "codebasics.nodeAffinityService" . | nindent 6 }}

      {{- include "codebasics.appVolumes" . | nindent 6 }}

      containers:
        - name: jobs
          imagePullPolicy: IfNotPresent
          image: "{{ .Values.app.image.repository }}:{{ .Chart.Version }}"
          resources:
            requests:
              memory: "300Mi"
              cpu: "10m"
            limits:
              memory: '600Mi'
          command: ["bin/jobs"]
          volumeMounts:
            - mountPath: /tmp/hexlet-basics
              name: users-code-path
            - mountPath: /var/run/docker.sock
              name: docker-sock
            - name: docker-secret
              mountPath: /home/rails/.docker
          envFrom:
            - secretRef:
                name: codebasics-environment-secrets
          env:
            - name: HEXLET_BASICS_RELEASE_VERSION
              value: {{ .Chart.Version }}
            - name: RAILS_MAX_THREADS
              value: "5"
