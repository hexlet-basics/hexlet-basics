---

apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: "{{ include "codebasics.fullname" . }}-web-pdb"
  labels:
    {{- include "codebasics.labels" . | nindent 4 }}
    app.kubernetes.io/component: "web"
spec:
  minAvailable: 1
  selector:
    matchLabels:
      {{- include "codebasics.selectorLabels" (dict "context" . "component" "web") | nindent 6 }}
