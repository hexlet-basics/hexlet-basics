---

apiVersion: apps/v1
kind: Deployment
metadata:
  name: "{{ .Release.Name }}-console-deployment"
  namespace: "{{ .Release.Namespace }}"
  labels:
    {{- include "codebasics.labels" . | nindent 4 }}

spec:
  replicas: 1

  selector:
    matchLabels:
      app.kubernetes.io/name: "{{ .Release.Name }}-console-pod"
      app.kubernetes.io/instance: "{{ .Release.Name }}"
  template:
    metadata:
      labels:
        app.kubernetes.io/name: "{{ .Release.Name }}-console-pod"
        app.kubernetes.io/instance: "{{ .Release.Name }}"
    spec:
      {{- include "codebasics.podScheduling" . | nindent 6 }}

      {{- include "codebasics.nodeAffinityService" . | nindent 6 }}

      {{- include "codebasics.appVolumes" . | nindent 6 }}

      containers:
        - name: console
          imagePullPolicy: IfNotPresent
          image: "{{ .Values.app.image.repository }}:{{ include "codebasics.version" . }}"
          command: [ "/bin/bash", "-c", "--" ]
          args: [ "while true; do sleep 30; done;"  ]
          resources:
            requests:
              memory: 50Mi
              cpu: 10m
            limits:
              memory: 700Mi
          volumeMounts:
            - mountPath: /tmp/hexlet-basics
              name: users-code-path
            - mountPath: /var/run/docker.sock
              name: docker-sock
            - name: docker-secret
              mountPath: /home/rails/.docker
          envFrom:
            - secretRef:
                name: codebasics-environment-secrets
          env:
            - name: HEXLET_BASICS_RELEASE_VERSION
              value: {{ include "codebasics.version" . }}
            - name: RAILS_MAX_THREADS
              value: "2"
