---

apiVersion: v1
kind: Service
metadata:
  name: "{{ include "codebasics.fullname" . }}-web-service"
  labels:
    {{- include "codebasics.labels" . | nindent 4 }}
    app.kubernetes.io/component: "web"
spec:
  selector:
    {{- include "codebasics.selectorLabels" (dict "context" . "component" "web") | nindent 4 }}
  ports:
    - port: 80
      targetPort: 8080
