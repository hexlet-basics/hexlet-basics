apiVersion: v2
name: codebasics
description: A Helm chart for deploying codebasics
type: application
# Единственный источник версии деплоя. release-please бампает $.version
# (см. release-please-config.json), шаблоны читают его как .Chart.Version.
# Голый semver = тег Docker-образа; git-тег vX.Y.Z добавляет release-please.
version: 0.1.0
# Чистая метадата, на рантайм не влияет; убирает [INFO] icon is recommended в helm lint.
icon: https://code-basics.com/favicon.ico
