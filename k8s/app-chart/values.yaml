---

version: v1289

nginx:
  image:
    repository: hexletbasics/services-nginx

app:
  image:
    repository: hexletbasics/services-app

# ingress описывает внешний доступ через Yandex Cloud ALB (см. ingress.yaml).
ingress:
  # инфраструктурные идентификаторы провайдера (YC ALB).
  externalIp: "89.169.182.43"
  subnets: "e2lfircmrq1atgmlg7ib"
  groupName: "codebasics-ingress-group"
  upgradeTypes: "websocket"
  # TLS-сертификат в YC Certificate Manager (secretName вида yc-certmgr-cert-id-...).
  tlsSecret: "yc-certmgr-cert-id-fpqgjl11q387a86d42kn"
  tlsHosts:
    - "code-basics.com"
  # hosts: full=true рендерит роуты API уроков (→ web-check) + / (→ web);
  # full=false — только / (→ web). code-basics.com дублирует *.code-basics.com
  # намеренно: без отдельной записи YC ALB не создаёт TLS-роут (см. ingress.yaml).
  hosts:
    - host: "*.code-basics.com"
      full: true
    - host: "code-basics.ru"
      full: false
    - host: "code-basics.com"
      full: true

# sentry настраивает регистрацию деплоя (см. notify.job.yaml).
sentry:
  image: getsentry/sentry-cli:2
  url: https://sentry.hexlet.io/
  org: hexlet
  environment: production

# =============================================================================
# ROADMAP: что планируем добавить в этот чарт
# -----------------------------------------------------------------------------
# История: был отдельный экспериментальный чарт k8s_prototype (Gateway API, HPA,
# PDB, NetworkPolicy, values.schema.json). Мы откатились на этот чарт и удалили
# прототип; идеи фиксируем здесь как план, чтобы вносить по одной и проверяемо.
#
# ВАЖНО: перед реализацией каждого пункта СВЕРЯТЬСЯ С АКТУАЛЬНОЙ ДОКОЙ
# (API-версии в K8s меняются). Версии ниже сверены на 2026-07:
#
# 0. [СДЕЛАНО] icon в Chart.yaml — убрал единственное замечание helm lint.
#
# 1. PodDisruptionBudget (policy/v1, GA с 1.21) — низкий риск, польза при drain
#    ноды/апгрейде кластера. НЕ копировать селектор из прототипа: у нас поды
#    помечены `app.kubernetes.io/name: <release>-web-pod` (без лейбла
#    app.kubernetes.io/component). Селектор PDB должен совпадать 1:1 с этими
#    лейблами, иначе PDB ни на что не действует. minAvailable: 1 при 2 репликах.
#    ВНИМАНИЕ: в policy/v1 пустой selector {} выбирает ВСЕ поды namespace.
#
# 2. values.schema.json — валидация values. Писать ЗАНОВО под нашу вложенную
#    структуру (nginx.image.repository / app.image.repository), схема прототипа
#    была под плоские ключи и отвергнет наши values. Рантайм-риска нет, но кривая
#    схема заблокирует deploy. Helm ожидает JSON Schema (сверить draft в доке Helm).
#
# 3. HPA (autoscaling/v2, GA с 1.23) — НЕ «без риска». Требует:
#      - убрать статический `replicas` из web.deployment.yaml (иначе helm upgrade
#        будет сбрасывать реплики и драться с HPA — см. комментарий там);
#      - metrics-server в кластере (иначе CPU/memory-метрики недоступны).
#
# 4. NetworkPolicy (networking.k8s.io/v1) — только осмысленные правила. Вариант
#    из прототипа (ingress/egress = allow-all) бесполезен. Требует поддержки в CNI.
#
# 5. Gateway API (gateway.networking.k8s.io/v1; на 2026 актуальны релизы 1.5/1.6)
#    — ВЫСОКИЙ риск: полностью заменяет текущий ingress.yaml (см. комментарий там).
#    Мигрировать отдельной задачей, не в связке с другими пунктами.
# =============================================================================
