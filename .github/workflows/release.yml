name: release

# Reusable workflow: builds & pushes the release Docker images for a given tag.
# Called from release-please.yml after it publishes a release (see the comment
# there for why this is invoked in-run rather than triggered by `release:
# published` — GITHUB_TOKEN-published releases don't trigger other workflows).
on:
  workflow_call:
    inputs:
      release_version:
        description: Bare semver used as the Docker image tag (e.g. 0.2.0)
        required: true
        type: string

env:
  CI: true
  APP_IMAGE_NAME: hexletbasics/services-app
  # CADDY_IMAGE_NAME: hexletbasics/services-caddy
  NGINX_IMAGE_NAME: hexletbasics/services-nginx
  COLOR_MAP: '{ success: "#008000", failure: "#800000" }'
  APP_HOST: code-basics.com

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Set Tag To The Env
        run: echo "RELEASE_VERSION=${{ inputs.release_version }}" >> $GITHUB_ENV

      - name: Login to DockerHub
        uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Build&Push App
        uses: docker/build-push-action@v7
        with:
          context: .
          # file: Dockerfile.production
          cache-from: type=registry,ref=${{ env.APP_IMAGE_NAME }}
          push: true
          tags: ${{ env.APP_IMAGE_NAME }}:${{ env.RELEASE_VERSION }}
          secrets: |
            "sentry-org=${{ secrets.SENTRY_ORG }}"
            "sentry-url=${{ secrets.SENTRY_URL }}"
            "sentry-project=${{ secrets.SENTRY_PROJECT }}"
            "sentry-dsn=${{ secrets.SENTRY_DSN }}"
            "sentry-auth-token=${{ secrets.SENTRY_AUTH_TOKEN }}"
            "yandex-metrika-counter-id=${{ secrets.YANDEX_METRIKA_COUNTER_ID }}"
          build-args: |
            RELEASE_VERSION=${{ env.RELEASE_VERSION }}
            APP_HOST=${{ env.APP_HOST }}

      - name: Build&Push Nginx
        uses: docker/build-push-action@v7
        with:
          context: .
          file: services/web-nginx/Dockerfile
          push: true
          tags: ${{ env.NGINX_IMAGE_NAME }}:${{ env.RELEASE_VERSION }}
          build-args: |
            APP_IMAGE_WITH_TAG=${{ env.APP_IMAGE_NAME }}:${{ env.RELEASE_VERSION }}

