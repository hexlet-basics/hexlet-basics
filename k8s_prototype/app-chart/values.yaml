---

# version is the application image tag used by all workloads.
version: "v1278"

# nameOverride overrides the chart name part in generated resource names.
nameOverride: ""

# fullnameOverride fully overrides generated resource names.
fullnameOverride: ""

# nginxImageRepository is the nginx image repository.
nginxImageRepository: "hexletbasics/services-nginx"

# appImageRepository is the app image repository.
appImageRepository: "hexletbasics/services-app"

# sentry configures deploy registration (see notify-job.yaml).
sentry:
  # image is the sentry-cli image used by the deploy-notify job.
  image: "getsentry/sentry-cli:2"
  # url is the (self-hosted) Sentry base URL.
  url: "https://sentry.hexlet.io/"
  # org is the Sentry organization slug.
  org: "hexlet"
  # environment is the Sentry deploy environment.
  environment: "production"

# gatewayClassName is the GatewayClass name.
gatewayClassName: "gwin-default"
# gatewayAddressType is the gateway address type.
gatewayAddressType: "gwin.yandex.cloud/staticIPv4"
# gatewayAddressValue is the gateway address value.
gatewayAddressValue: "89.169.182.43"
# gatewaySubnetIds is the list of subnet IDs used by gateway policy.
gatewaySubnetIds:
  - "e2lfircmrq1atgmlg7ib"
# gatewayCertificateId is the ID of TLS certificate in provider.
gatewayCertificateId: "fpqgjl11q387a86d42kn"
# primaryHost is the main host.
primaryHost: "code-basics.com"
# wildcardHost is the wildcard host.
wildcardHost: "*.code-basics.com"
# secondaryHost is the secondary host.
secondaryHost: "code-basics.ru"
# gatewayBackendUseHttp2 enables HTTP/2 to backend services.
gatewayBackendUseHttp2: true
# gatewayBackendUpgradeType is the allowed upgrade type for HTTP routes.
gatewayBackendUpgradeType: "websocket"

# webAutoscalingEnabled toggles HPA for web deployment.
webAutoscalingEnabled: true
# webAutoscalingMinReplicas is the minimum number of pods.
webAutoscalingMinReplicas: 2
# webAutoscalingMaxReplicas is the maximum number of pods.
webAutoscalingMaxReplicas: 6
# webAutoscalingTargetCpuUtilizationPercentage is the target CPU utilization percentage.
webAutoscalingTargetCpuUtilizationPercentage: 75
# webAutoscalingTargetMemoryUtilizationPercentage is the target memory utilization percentage.
webAutoscalingTargetMemoryUtilizationPercentage: 80

# networkPolicyEnabled toggles network policy resource.
networkPolicyEnabled: true

# dockerConfig is base64 source content for .dockerconfigjson (raw, chart encodes it).
dockerConfig: ""
# appEnv is key-value map for application secret environment variables.
appEnv: {}
