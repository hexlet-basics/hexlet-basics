---

apiVersion: gwin.yandex.cloud/v1
kind: RoutePolicy
metadata:
  name: "{{ include "codebasics.fullname" . }}-route-policy"
  labels:
    {{- include "codebasics.labels" . | nindent 4 }}
spec:
  targetRefs:
    - group: gateway.networking.k8s.io
      kind: HTTPRoute
      name: "{{ include "codebasics.fullname" . }}-main-httproute"
    - group: gateway.networking.k8s.io
      kind: HTTPRoute
      name: "{{ include "codebasics.fullname" . }}-secondary-httproute"
  policy:
    rules:
      http:
        upgradeTypes: ["{{ .Values.gatewayBackendUpgradeType }}"]
      backends:
        http:
          useHTTP2: {{ .Values.gatewayBackendUseHttp2 }}
