---

apiVersion: batch/v1
kind: Job
metadata:
  name: "{{ include "codebasics.fullname" . }}-notify-{{ .Values.version }}"
  labels:
    {{- include "codebasics.labels" . | nindent 4 }}
    app.kubernetes.io/component: "notify"
  annotations:
    # NOTE: регистрируем деплой в Sentry один раз за релиз, ПОСЛЕ успешной раскатки.
    # Раньше это делал postStart-хук web-контейнера, из-за чего деплой слался на каждый
    # старт пода (рескейл, drain, OOM) и по разу на каждую реплику.
    "helm.sh/hook": post-install,post-upgrade
    "helm.sh/hook-weight": "5"
    "helm.sh/hook-delete-policy": before-hook-creation

spec:
  backoffLimit: 1
  activeDeadlineSeconds: 120
  template:
    metadata:
      labels:
        {{- include "codebasics.labels" . | nindent 8 }}
        app.kubernetes.io/component: "notify"
    spec:
      restartPolicy: Never

      nodeSelector:
        group: "{{ .Release.Namespace }}"

      imagePullSecrets:
        - name: docker-config

      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        runAsGroup: 1000
        fsGroup: 1000

      affinity:
        nodeAffinity:
          requiredDuringSchedulingIgnoredDuringExecution:
            nodeSelectorTerms:
              - matchExpressions:
                  - key: role
                    operator: In
                    values:
                      - service

      containers:
        - name: notify
          image: {{ .Values.sentry.image }}
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
          args:
            - "deploys"
            - "new"
            - "--release"
            - "{{ .Values.version }}"
            - "-e"
            - "{{ .Values.sentry.environment }}"
          resources:
            requests:
              memory: "64Mi"
              cpu: "10m"
            limits:
              memory: '128Mi'
          env:
            # NOTE: self-hosted Sentry, иначе sentry-cli ходит в sentry.io.
            - name: SENTRY_URL
              value: "{{ .Values.sentry.url }}"
            - name: SENTRY_ORG
              value: "{{ .Values.sentry.org }}"
            # NOTE: sentry-cli читает токен из SENTRY_AUTH_TOKEN; в секрете ключ SENTRY_API_TOKEN.
            - name: SENTRY_AUTH_TOKEN
              valueFrom:
                secretKeyRef:
                  name: codebasics-environment-secrets
                  key: SENTRY_API_TOKEN
