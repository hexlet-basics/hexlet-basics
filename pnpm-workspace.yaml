overrides:
  # patch transitive vulns: undici via release-it (dev), dompurify via monaco-editor
  undici: ^6.27.0
  dompurify: ^3.4.11
allowBuilds:
  '@sentry/cli': true
  '@swc/core': true
  sharp: true
  simple-git-hooks: true
minimumReleaseAgeExclude:
  - npm-check-updates@22.2.8
onlyBuiltDependencies:
  - '@parcel/watcher'
  - '@sentry/cli'
  - '@swc/core'
  - esbuild
  - sharp
  - simple-git-hooks
