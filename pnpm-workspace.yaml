overrides:
  # patch transitive vulns: undici via release-it (dev), dompurify via monaco-editor
  undici: ^6.27.0
  dompurify: ^3.4.11
allowBuilds:
  '@sentry/cli': true
  '@swc/core': true
  sharp: true
  simple-git-hooks: true
minimumReleaseAgeExclude:
  - npm-check-updates@22.2.8 || 22.2.9
  - '@mantine/carousel@9.4.1'
  - '@mantine/code-highlight@9.4.1'
  - '@mantine/colors-generator@9.4.1'
  - '@mantine/core@9.4.1'
  - '@mantine/dates@9.4.1'
  - '@mantine/hooks@9.4.1'
  - '@mantine/modals@9.4.1'
  - '@mantine/notifications@9.4.1'
  - '@mantine/store@9.4.1'
  - postcss@8.5.16
  - '@biomejs/biome@2.5.4'
  - '@biomejs/cli-darwin-arm64@2.5.4'
  - '@biomejs/cli-darwin-x64@2.5.4'
  - '@biomejs/cli-linux-arm64-musl@2.5.4'
  - '@biomejs/cli-linux-arm64@2.5.4'
  - '@biomejs/cli-linux-x64-musl@2.5.4'
  - '@biomejs/cli-linux-x64@2.5.4'
  - '@biomejs/cli-win32-arm64@2.5.4'
  - '@biomejs/cli-win32-x64@2.5.4'
  - beasties@0.4.3
  - vite-plugin-beasties@0.4.3
onlyBuiltDependencies:
  - '@parcel/watcher'
  - '@sentry/cli'
  - '@swc/core'
  - esbuild
  - sharp
  - simple-git-hooks
