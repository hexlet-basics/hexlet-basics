# Omakase Ruby styling for Rails
inherit_gem: { rubocop-rails-omakase: rubocop.yml }

plugins:
  - rubocop-sorbet
  - rubocop-minitest
  - rubocop-capybara
  - rubocop-factory_bot
  - rubocop-rake

# Overwrite or add rules to create your own house style
#
# # Use `[a, [b, c]]` not `[ a, [ b, c ] ]`
# Layout/SpaceInsideArrayLiteralBrackets:
#   Enabled: false
AllCops:
  TargetRubyVersion: 4.0
  NewCops: enable

# Omakase ставит DisabledByDefault и включает только стилевой минимум.
# Стиль (Style/Layout/Metrics) оставляем ему, но correctness-департаменты
# включаем целиком: Lint, Security, Performance, Rails, Bundler.
Lint:
  Enabled: true
Security:
  Enabled: true
Performance:
  Enabled: true
Rails:
  Enabled: true
Bundler:
  Enabled: true

Rails/UnknownEnv:
  Environments:
    - development
    - test
    - production
    - staging

# find_by_password_reset_token! — реальный метод Rails 8
# (has_secure_password reset_token:), а не динамический finder
Rails/DynamicFindBy:
  AllowedMethods:
    - find_by_sql
    - find_by_password_reset_token!

# `def ... super end` используется как носитель Sorbet-сигнатуры —
# удаление "бесполезного" метода снимает типизацию
Lint/UselessMethodDefinition:
  Enabled: false

# delegate несовместим с Sorbet-сигнатурами: sig требует явного def,
# автокоррект оставляет сироту-sig (srb 5040/5003)
Rails/Delegate:
  Enabled: false

# Дублирующиеся литеральные ветки в case-маппингах (Ruby-тип -> TS-тип)
# читаются лучше, чем склейка when-ов
Lint/DuplicateBranch:
  IgnoreLiteralBranches: true

Rails/Output:
  Exclude:
    # CLI-экспортер, запускается из rake, puts — его интерфейс
    - 'app/lib/events_types_exporter.rb'

# Техдолг: уникальные индексы нужно добавлять отдельной миграцией
# после проверки данных в проде на дубликаты
Rails/UniqueValidationWithoutIndex:
  Exclude:
    - 'app/models/blog_post/related_language_item.rb'
    - 'app/models/language/category.rb'
    - 'app/models/language/category/item.rb'
    - 'app/models/language/landing_page.rb'
    - 'app/models/language/lesson/review.rb'
    - 'app/models/survey/scenario/member.rb'

# Контроллерные тесты намеренно "толстые": один сценарий —
# несколько проверок статуса, тела и состояния
Minitest/MultipleAssertions:
  Enabled: false

# Держим планку `# typed: strict` по умолчанию для app/.
# Каждая строка Exclude — техдолг с понятной причиной.
Sorbet/StrictSigil:
  Enabled: true
  Include:
    - 'app/**/*.rb'
  Exclude:
    # RubyLLM acts_as_* DSL без RBI
    - 'app/models/ai_chat.rb'
    - 'app/models/ai_message.rb'
    - 'app/models/ai_model.rb'
    - 'app/models/ai_tool_call.rb'
    - 'app/jobs/assistants/run_job.rb'
    # DSL / заглушки
    - 'app/lib/configus.rb'
    - 'app/services/sms_sender_smsc.rb'
    # намеренно # typed: true (кандидаты на подъём в будущем)
    - 'app/lib/event_sender.rb'
    - 'app/controllers/concerns/event_concern.rb'
    - 'app/handlers/amocrm_handler.rb'
    - 'app/services/social_network_service.rb'

# Дешёвые correctness-проверки на весь проект
Sorbet/EnforceSigilOrder:
  Enabled: true
Sorbet/ValidSigil:
  Enabled: true
